[package]
name = "venice-e2ee-proxy"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.0", features = ["macros", "net", "rt-multi-thread"] }
toml = "0.8"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }

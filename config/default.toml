[server]
host = "0.0.0.0"
port = 8080

[logging]
level = "info"

[venice]
base_url = "https://api.venice.ai/api/v1"
api_key = ""
request_timeout = "30s"

[keys]
generate_proxy_instance_key_on_startup = true

[session]
idle_ttl = "10m"
max_ttl = "30m"
max_requests = 100
fallback_scope = "request"

[session.headers]
preferred = "X-Venice-Proxy-Session-Id"
open_webui = "X-OpenWebUI-Chat-Id"

[attestation]
mode = "independent"
require_tdx = true
require_nvidia = "when_present"
allow_debug = false
pccs_url = ""

[e2ee]
hkdf_info = "ecdsa_encryption"
require_encrypted_response_content = true

[tools]
enabled = true
mode = "emulated"
marker_start = "<tool_call>"
marker_end = "</tool_call>"
max_retries = 2
initial_marker_scan_bytes = 128
tool_call_max_bytes = 65536
tool_call_marker_timeout = "30s"
validate_json_schema = true
emit_tool_call_arguments_single_chunk = true

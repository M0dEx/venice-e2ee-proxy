[server]
host = "0.0.0.0"
port = 8080

[logging]
level = "info"

[venice]
base_url = "https://api.venice.ai/api/v1"
api_key = ""
request_timeout = "30s"

[keys]
generate_proxy_instance_key_on_startup = true

[session]
idle_ttl = "10m"
max_ttl = "30m"
max_requests = 100
fallback_scope = "request"

[session.headers]
incoming_session_id = "X-Venice-Proxy-Session-Id"

[attestation]
mode = "independent"
require_tdx = false
require_nvidia = "never"
allow_debug = false
pccs_url = ""

[e2ee]
hkdf_info = "ecdsa_encryption"
require_encrypted_response_content = true

[tools]
enabled = true
mode = "emulated"
max_retries = 2
tool_call_max_bytes = 65536
tool_call_marker_timeout = "30s"
validate_json_schema = true
